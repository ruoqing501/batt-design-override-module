# Configurable parameters for batt_design_override.ko
# Edit and reflash module to change; or push an updated params.conf to /data/adb/modules/batt-design-override/common/

# Target power_supply name (default: battery)
BATT_NAME="battery"

# Design capacity in uAh (set 0 to disable)
DESIGN_UAH=7500000

# Design energy in uWh (set 0 to disable)
DESIGN_UWH=34575000

# Battery model name override (POWER_SUPPLY_PROP_MODEL_NAME); empty string disables
# 对应内核模块参数 model_name；如需让 /sys/class/power_supply/*/model_name 输出自定义值，设置此变量
MODEL_NAME="DONGGUANQRD_QUALCOMM_4190MAH_AVERAGED_MASTERSLAVE_DEC3RD2021"

# Override any power_supply regardless of name (0/1)
OVERRIDE_ANY=0

# Verbose logs (0/1)
VERBOSE=0

# ===== prop (可选）=====
# 是否覆盖 power_profile.xml 中的 battery.capacity（mAh）让设置里显示同步变化
PROFILE_ENABLE=1
# 直接指定显示容量（mAh）；若为 0 则自动用 DESIGN_UAH/1000 估算
CAPACITY_MAH=0

# ===== 自动安装 LSPosed 模块 APK（可选）=====
# 将已构建好的 APK 放到模块目录 common 下（默认文件名见下）。
# 开启后，开机时若未安装则自动安装；可选强制重装。
AUTO_INSTALL_LSPOSED=1
# APK 默认路径（相对于设备上的模块目录）。打包 zip 时请连同此文件一并放入。
LSP_APK_PATH="${MODDIR}/common/battcaplsp.apk"
# 包名（若你自定义了包名，请同步修改）
LSP_PKG_NAME="com.override.battcaplsp"
# 强制重装（0/1）。1 表示每次开机都覆盖安装（-r -d），0 表示仅在未安装时安装。
LSP_FORCE_REINSTALL=0
