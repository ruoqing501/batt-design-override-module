name: Android CI

permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        default: '1.0.0'
      release:
        description: '是否发布 Release'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # 需要完整历史来创建 tag

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Debug Keystore
      run: |
        mkdir -p ~/.android/
        if [ ! -f ~/.android/debug.keystore ]; then
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x lsposed-module/gradlew

    - name: Build Release APK
      run: |
        cd lsposed-module
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: lsposed-module/app/build/outputs/apk/release/*.apk

    - name: Create Tag and Release
      if: github.event.inputs.release == 'true' || github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ github.event.inputs.version || 'auto' }}"
        if [ "$VERSION" = "auto" ]; then
          # 自动递增版本：读取最新 tag +1
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "app-v0.0.0")
          NUM=$(echo $LATEST | sed 's/app-v//')
          MAJOR=$(echo $NUM | cut -d. -f1)
          MINOR=$(echo $NUM | cut -d. -f2)
          PATCH=$(echo $NUM | cut -d. -f3)
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
        fi
        TAG="app-v${VERSION}"
        echo "Creating tag: $TAG"
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag -a "$TAG" -m "Release $TAG"
        git push origin "$TAG"

    - name: Release APK
      if: github.event.inputs.release == 'true' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: app-v${{ github.event.inputs.version || 'auto' }}
        files: lsposed-module/app/build/outputs/apk/release/*.apk
        generate_release_notes: true
        fail_on_unmatched_files: true
