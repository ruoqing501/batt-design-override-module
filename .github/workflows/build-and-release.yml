name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [master]
    tags:
      - 'v*'
      - 'app-v*'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        default: 'auto'
      release:
        description: '是否发布 Release'
        required: true
        type: boolean
        default: true

jobs:
  build-app:
    name: Build App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android/
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x lsposed-module/gradlew

      - name: Build Release APK
        run: |
          cd lsposed-module
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: lsposed-module/app/build/outputs/apk/release/*.apk

      - name: Create Tag and Release
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true') || github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || 'auto' }}"
          if [ "$VERSION" = "auto" ]; then
            LATEST=$(git describe --tags --abbrev=0 --match 'app-v*' 2>/dev/null || echo "app-v0.0.0")
            NUM=$(echo $LATEST | sed 's/app-v//')
            MAJOR=$(echo $NUM | cut -d. -f1)
            MINOR=$(echo $NUM | cut -d. -f2)
            PATCH=$(echo $NUM | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          TAG="app-v${VERSION}"
          echo "Creating tag: $TAG"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Release APK
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true') || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/app-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ github.event.inputs.version || 'auto' }}
          files: lsposed-module/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

  build-modules:
    name: Build Modules
    strategy:
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-build-modules.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: '20251104'

  release-modules:
    name: Release Modules
    needs: build-modules
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Debug Info
        run: |
          echo "Ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: modules-*
          merge-multiple: true

      - name: Repackage
        run: |
          mkdir release_files
          find artifacts -name "*.ko" -exec cp {} release_files/ \;
          ls -la release_files/
          [ "$(ls -A release_files)" ] || { echo "No .ko files!"; exit 1; }

      - name: Release KO Modules
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
